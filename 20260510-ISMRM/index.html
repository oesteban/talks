# The research workflow of brain networks

.boxed-content[
<object type="image/svg+xml" data="../assets/neuroimaging-workflow-large.svg" style="width: 100%; padding-top: 20pt;"></object>

.center[
[Esteban et al. (2020)](http://doi.org/10.1038/s41596-020-0327-3);
[Niso et al. (2022)](https://doi.org/10.1016/j.neuroimage.2022.119623)
]
]

???

In broad strokes, this is the MRI-based network analysis pipeline.

Interestingly, it looks like any machine learning pipeline: we acquire data, perform quality control, preprocess it, define features, and then apply statistical modeling to extract insights.

For a deeper dive into the details of the neuroimaging worflow, I've participated in several efforts such as the two references given below.

# The research workflow of brain networks

.boxed-content[
<object type="image/svg+xml" data="../assets/neuroimaging-workflow-1.svg" style="width: 100%; padding-top: 20pt;"></object>

.center[
[Esteban et al. (2017)](https://doi.org/10.1371/journal.pone.0184661);
[Provins et al. (2023)](https://doi.org/10.3389/fnimg.2022.1073734); <br />
[Provins et al. (2025)](https://doi.org/10.1371/journal.pbio.3003149)
[Hagen et al. (2025, *accepted*)](https://doi.org/10.1101/2024.10.21.619532)
]
<br />

.no-bullet[
* .larger[<i class="fa-solid fa-clipboard-list"></i> Run the **MRI experiment** following Standard Operating Procedures (SOPs)]

* <i class="fa-solid fa-folder-tree"></i> .larger[**Standardized data structure** (BIDS—Brain Imaging Data Structure)]

* .larger[<i class="fa-solid fa-square-check"></i> **QA/QC** (Quality assurance / control)]

]

]

???

The pipeline starts with data acquisition, management and quality assurance and control (QA/QC).

My early work on QA/QC applied machine learning to automatically assess MRI images of the brain, and raised awareness over issues like “site effects”—where data from different scanners or labs can systematically vary, much like “batch effects” in genomics.

One key principle in AI is that models are only as good as their data and neuroimaging is no exception.

This is why my group and I have been deeply involved in BIDS, produced version-controlled, machine-readable standard operating procedures, developed comprehensive QA/QC protocols and created ready-to-use applications to detect suboptimal data early.

.no-bullet[

* .larger[<i class="fa-solid fa-magnifying-glass-location"></i> Spatiotemporal **location** of signals]

* .larger[<i class="fa-solid fa-location-crosshairs"></i> Definition of **brain units** of analysis (regions)]

]
]

???

Next in the pipeline is preprocessing, which transforms raw data into something models can reliably interpret.

For example, it identifies signals of no interest for their cleaning or accounting within modeling.

In neuroimaging, preprocessing also deals with accurately locating signals and objects in space and time, and often the definition of relevant brain regions that focus the analysis.

A decade ago, we might have called it “feature engineering.”

Regardless of the term, it’s crucial: “preprocessing” is now a keyword in job posts at major players like Anthropic, DeepMind, and OpenAI.

# The research workflow of brain networks

.boxed-content[
<object type="image/svg+xml" data="../assets/neuroimaging-workflow-3.svg" style="width: 100%; padding-top: 20pt;"></object>

.center[
[Thompson et al., (2021, *under review*)](https://doi.org/10.1101/2021.01.16.426941);
[Rodrigue et al., (2021)](https://doi.org/10.1016/j.bpsc.2020.12.002);
[Li et al., (2024)](https://doi.org/10.1038/s41562-024-01942-4)
]
]

.pull-right[
<img src="../assets/matrix-fc.png" alt="matrix-fc" style="width: 20%" />
<br />
**Functional Connectivity (FC)**
<br />
.gray-text[Synchronized BOLD co-variation between brain regions]
]

.pull-left.align-right[
<img src="../assets/matrix-sc.png" alt="matrix-fc" style="width: 20%" />
<br />
**Structural Connectivity (SC)**
<br />
.gray-text[Tracked water diffusion pathways between brain regions]

]

???

Once data are ready for analysis, we formalize connectivity as undirected acyclic graphs, represented with symmetric matrices.

In the case of structural connectivity, we use diffusion MRI to track pathways of white-matter bundles connecting brain regions.

For functional connectivity we measure synchronized functional MRI signal fluctuations sensitive to the dynamic oxygen content in blood.

I’ve been involved in several works applying structural and functional connectivity.

For instance, in Rodrigue 2021, we explored ML approaches to identify clinical biomarkers.

Unfortunately, we had to conclude that, despite promising data quality and reliability remain insufficient for robust biomarker discovery.

# Despite active research, scarce clinical application

.boxed-content[
.center[
<object type="image/svg+xml" data="../assets/neuroimaging-workflow-large.svg" style="width: 100%; padding-bottom: 10pt; padding-top: 20pt;"></object>
]

.no-bullet[
* .large[<i class="fa-solid fa-triangle-exclamation"></i> Alarming **analytical variability**:]
  * .larger[Diffusion MRI [[Maier-Hein et al., (2015)](https://doi.org/10.1038/s41467-017-01285-x)]]
  * .larger[Functional MRI [[Botvinik-Nezer et al., (2020)](https://doi.org/10.1038/s41586-020-2314-9)]]

<br />
* .large[<i class="fa-solid fa-dna"></i> **Like genomics** between HGP (2003) and NGS (2015)?]
]
]

???

Therefore, although simple on the surface, the workflow is highly-complex and each step introduces potential variability.

Complicating matters further, every lab around the world might use a slightly different pipeline.

Different tools, different parameters—lead to inconsistent results.

This fragmentation hinders progress and precludes between-study comparisons.

The consequence is an acute scarcity of real-world applications of connectivity analyses.

Let's compare to genomics.

Neuroimaging is today in an early stage of standardization akin to genomics at the conclusion of the Human Genome Project in 2003.

One key aspect for the remarkable advance of genomics is precisely the comprehensive standardization process of the pipeline that culminated some 10 years ago.

For that reason, I advocate for replicating this success experience in neuroscience.

The pipeline IS the experiment.

# Pipeline-induced variance — *Li et al. 2024*

.pull-left[
<br />

.larger[
*"Moving beyond processing- and analysis-related variation in human neuroscience"*
]

.gray-text[Li, …, Milham. *Nat Hum Behav* 2024 — doi:![:doi](10.1038/s41562-024-01942-4); preprint [bioRxiv 2021.12.01.470790](https://doi.org/10.1101/2021.12.01.470790).]

<br />

.large.no-bullet[
* <i class="fa-solid fa-triangle-exclamation"></i> Pipeline choices are a **first-order** contributor to downstream variance — not a rounding error.

* <i class="fa-solid fa-circle-up"></i> Preprocessing reproducibility **upper-bounds** analysis reproducibility.
]

]

.pull-right.center[
<img src="images/li-2024-pipeline-variance.png" alt="Li et al. 2024 — variance partitioning across pipeline choices" style="width: 100%; padding-top: 8pt" />
]

???

Where NARPS quantified the *spread* across teams, Li, Milham et al. quantify the *attribution*: how much of that spread comes from the pipeline alone.

The answer is "a lot". Pipeline is not noise — it's signal of the wrong kind.

If preprocessing reproducibility upper-bounds analysis reproducibility, then preprocessing is where you spend the engineering effort.

# Despite active research, no real-world application

.boxed-content[
.center[
<object type="image/svg+xml" data="../assets/neuroimaging-workflow-large.svg" style="width: 100%; padding-bottom: 10pt; padding-top: 20pt;"></object>
]

.no-bullet[
* .large[<i class="fa-solid fa-triangle-exclamation"></i> Alarming **analytical variability**:]
  * .larger[Diffusion MRI [[Maier-Hein et al., (2015)](https://doi.org/10.1038/s41467-017-01285-x)]]
  * .larger[Functional MRI [[Botvinik-Nezer et al., (2020)](https://doi.org/10.1038/s41586-020-2314-9)]]

<br />
* .large[<i class="fa-solid fa-magnifying-glass-plus"></i> Insufficient **test-retest reliability** at the finer scales of brain units]
  * .larger[[Nakuci et al., (2023)](https://doi.org/10.1038/s41598-023-33441-3)]]
]

???

On top of all that methodological variability, there’s also inherent unreliability in measuring connectivity from session to session.

If you scan the same participant twice, back-to-back, you can still get different connectivity measurements, indicating limited test-retest reliability.

Despite all these concerns, more than 20 thousand papers were published focusing on functional connectivity and 10 thousand on structural connectivity in 2024, as per Pubmed.

# Five rules

## …for designing fMRI pipelines (with bias)

---

# Rule 1 — **Keep it simple.**

.pull-left[
<br />
.larger[
**Do the minimum so as not to foreclose downstream analyses.**
]

<br />

.large.no-bullet[
* <i class="fa-solid fa-circle-right"></i> *fMRIPrep* refuses to **smooth**.
* <i class="fa-solid fa-circle-right"></i> *fMRIPrep* refuses to regress out **nuisance signals**.
* <i class="fa-solid fa-circle-right"></i> It outputs the **confounds** instead — you choose.
]

<br />

.gray-text[
*"Preprocessing offers an opportunity to reduce analytical flexibility and enable cross-study comparisons; statistical modeling must keep flexibility so as not to stifle new ideas."*
]
]

.pull-right.center[
<br />
<br />

.huge[<i class="fa-solid fa-fish"></i>]

.large[**Analysis-grade ≈ sushi-grade**]

.gray-text[Minimally processed,
<br />*safe to consume directly.*]
]

???

Rule 1 — the design stance.

The pipeline's job is not to be "complete". It's to be **minimal in modeling commitments** while being **maximal in interoperability**.

The sushi analogy: the fish is gutted, scaled, deboned — but not cooked, marinated, or seasoned. Whatever the analyst wants to do *next*, the fish is ready.

---

# Rule 2 — **Adopt a standard.**

.pull-left[
<br />
.larger[
**BIDS in. BIDS-Derivatives out.**
]

<br />

.large[
A standard turns *"my pipeline"* into *"any pipeline"*.
]

<br />

.no-bullet.larger[
* <i class="fa-solid fa-folder-tree"></i> Inputs: machine-readable, validated.
* <i class="fa-solid fa-handshake"></i> Outputs: **contract**, not artifacts.
* <i class="fa-solid fa-shuffle"></i> Swap fMRIPrep ↔ another tool, the analysis below doesn't care.
]
]

.pull-right[
<br />

```
sub-01/
├── anat/
│   └── sub-01_T1w.nii.gz
├── func/
│   ├── sub-01_task-rest_bold.nii.gz
│   └── sub-01_task-rest_bold.json
└── fmap/
    └── sub-01_dir-AP_epi.nii.gz
```

<br />

```
derivatives/fmriprep/
└── sub-01/
    └── func/
        ├── …_space-MNI152…_desc-preproc_bold.nii.gz
        ├── …_desc-confounds_timeseries.tsv
        └── …_desc-brain_mask.nii.gz
```
]

???

Rule 2 — without a standard, every reproducibility claim is a courtesy.

BIDS gave the field a typed input/output contract. BIDS-Derivatives extended that to outputs.

The win isn't aesthetic — it's that **swap-in / swap-out** becomes thinkable. You can run two pipelines on the same input and compare derivatives because they live in the same namespace.

---

# Rule 3 — **Decompose: *fit* &amp; *transform*.**

.pull-left[
<br />
.larger[
**Estimate parameters once. Apply many times.**
]

<br />

.large.no-bullet[
* <i class="fa-solid fa-screwdriver-wrench"></i> *fit* — slow, deterministic, cached.
* <i class="fa-solid fa-bolt"></i> *transform* — cheap, composable, **single resampling**.
]

<br />

.gray-text[
A scikit-learn pattern, retrofitted onto neuroimaging — and the most consequential architectural change in *fMRIPrep* since v1.
]
]

.pull-right.center[
<object type="image/svg+xml" data="images/fmriprep-fit-transform.svg" style="width: 100%; padding-top: 8pt"></object>
]

???

Rule 3 — *fit* once, *transform* many.

Why it matters:
- **One** resampling step (registrations composed analytically), not five — interpolation blur is a real, accumulating cost.
- The expensive bit (registrations, brain extraction, surfaces) is computed *once* and **reused** across runs, sessions, even projects.
- If you re-analyse in another space tomorrow, you don't rerun the whole pipeline — you re-*transform*.

This is the lesson I'd take forward to *every* MR pipeline, fMRI or otherwise.

---

# Rule 4 — **QC everywhere.**

.pull-left[
<br />
.larger[
**Visual reports + automated metrics, layered.**
]

<br />

.large.no-bullet[
* <i class="fa-solid fa-eye"></i> Per-subject **HTML reports** (visual).
* <i class="fa-solid fa-chart-line"></i> Per-cohort **IQMs** (automated).
* <i class="fa-solid fa-layer-group"></i> Multiple checkpoints — **Swiss-cheese model**.
]

<br />

.gray-text.small[
[Provins et al., (2023), *Front. Neuroimaging*](https://doi.org/10.3389/fnimg.2022.1073734)
]
]

.pull-right.center[
<object type="image/svg+xml" data="../assets/provins-qaqc-protocol.svg" style="width: 100%; padding-top: 4pt"></object>
]

???

Rule 4 — the warm-up Slido is most likely to point here.

*MRIQC* and *fMRIPrep* both ship visual reports. Why? Because no automated metric catches everything (look up the *Swiss-cheese model* of accident causation).

By layering checkpoints — automated IQMs, per-subject reports, group-level summaries — you make sure no single hole lets bad data through.

---

# Rule 5 — **Make it reproducible.**

.pull-left[
<br />
.larger[
**Containers + pinned versions + provenance + community.**
]

<br />

.large.no-bullet[
* <i class="fa-brands fa-docker"></i> **Docker / Apptainer** — same binary, every cluster.
* <i class="fa-solid fa-tag"></i> **Semantic versioning + LTS** — `24.0.1` means something.
* <i class="fa-solid fa-database"></i> **DataLad / TemplateFlow** — provenance for data &amp; templates.
* <i class="fa-solid fa-people-group"></i> **Open governance** — code review, CoC, contributor docs.
]

<br />

.gray-text[*"Reproducibility scales only if the **community** builds it together."*]
]

.pull-right.center[
<br />
<object type="image/svg+xml" data="../assets/nipreps-chart.png" style="width: 100%; padding-top: 12pt"></object>
.small[NiPreps ecosystem &mdash; [nipreps.org](https://www.nipreps.org)]
]

???

Rule 5 — the bookkeeping rule. Every previous rule depends on it.

This one hands off to Sophie's *Code Reviews* talk later in the session: containers and versions are necessary but not sufficient — **community processes** (review, governance, code of conduct) are what keep a reproducible pipeline reproducible across years and contributors.

# Recap — five rules + one meta-rule

<br />

.boxed-content.large.no-bullet[

* <i class="fa-solid fa-circle-1"></i> .larger[**Keep it simple.**]
  <br /> .indent[.gray-text[Do the minimum; don't foreclose downstream analyses.]]

* <i class="fa-solid fa-circle-2"></i> .larger[**Adopt a standard.**]
  <br /> .indent[.gray-text[BIDS in, BIDS-Derivatives out — input/output contract.]]

* <i class="fa-solid fa-circle-3"></i> .larger[**Decompose: fit &amp; transform.**]
  <br /> .indent[.gray-text[Estimate parameters once; apply many times; one resampling.]]

* <i class="fa-solid fa-circle-4"></i> .larger[**QC everywhere.**]
  <br /> .indent[.gray-text[Visual + automated, layered (Swiss-cheese).]]

* <i class="fa-solid fa-circle-5"></i> .larger[**Make it reproducible.**]
  <br /> .indent[.gray-text[Containers, versions, provenance, governance, community.]]

<br />

* <i class="fa-solid fa-circle-up"></i> .larger[***Meta:* preprocessing reproducibility upper-bounds analysis reproducibility.**]
]

???

The meta-rule is the one to remember even if you forget the five.
